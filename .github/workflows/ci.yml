name: CI

on:
  push:
    branches:
      - main
      - preview/**
  pull_request:
    branches:
      - main
      - preview/**
      - codex/**
      - claude/**
      - glm/**
      - cursor/**

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:db && npm run test:discovery && npm run test:slack && npm run test:admin && npm run test:eve && npm run test:dm && npm run test:metrics && npm run test:rag
