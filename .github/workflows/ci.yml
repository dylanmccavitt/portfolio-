name: CI

on:
  push:
    branches:
      - main
      - preview/**
  pull_request:
    branches:
      - main
      - preview/**
      - codex/**
      - claude/**
      - glm/**
      - cursor/**

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:db && npm run test:discovery && npm run test:slack && npm run test:admin && npm run test:dm && npm run test:metrics && npm run test:rag && npm run test:outbox && npm run test:proof && npm run test:release && npm run test:visual && npm run test:quality

      - name: Build exact-head replacement quality artifact
        if: github.event_name == 'pull_request'
        run: npm run package:quality -- "${{ github.event.pull_request.head.sha }}" "${{ github.event.pull_request.base.sha }}" "$RUNNER_TEMP/replacement-quality-proof" "proof/replacement-quality-visual-review.json"

      - name: Upload exact-head replacement quality artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: replacement-quality-proof-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/replacement-quality-proof
          if-no-files-found: error
          retention-days: 90
