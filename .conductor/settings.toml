#:schema https://conductor.build/schemas/settings.repo.schema.json

[scripts]
# Install dependencies when a workspace is created. No lockfile is committed,
# so use `npm install` rather than `npm ci`.
setup = "npm install"

# Astro dev server. Each workspace gets its own port range via CONDUCTOR_PORT.
run = "npm run dev -- --port $CONDUCTOR_PORT"

# Reclaim the per-workspace node_modules before archiving. Safe: only touches
# this workspace's installed deps, never the repo source.
archive = "rm -rf node_modules"

# Static Astro site with no shared local resources — workspaces can run in
# parallel on separate ports.
run_mode = "concurrent"
